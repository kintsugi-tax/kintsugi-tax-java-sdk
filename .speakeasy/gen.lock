ed**\n  *  `response` **Changed** (Breaking ⚠️)\n* `sdk.products.createProductV1ProductsPost()`: **Added**\n* `sdk.nexus.updatePhysical()`: \n  *  `request.physicalNexusUpdate` **Changed**\n  *  `response` **Changed**\n* `sdk.filings.getByRegistrationId()`:  `response.items[].marketplaceTransactionCount` **Added**\n* `sdk.registrations.get()`:  `response.items[].filingDays` **Changed**\n* `sdk.nexus.getPhysical()`:  `response.items[]` **Changed**\n* `sdk.registrations.getById()`: \n  *  `request.reveal` **Added**\n  *  `response.filingDays` **Changed**\n* `sdk.registrations.update()`:  `response.filingDays` **Changed**\n* `sdk.registrations.deregister()`:  `response.filingDays` **Changed**\n* `sdk.products.getProductsV1ProductsGet()`: **Added**\n* `sdk.nexus.createPhysical()`: \n  *  `request` **Changed**\n  *  `response` **Changed**\n* `sdk.filings.getById()`:  `response.marketplaceTransactionCount` **Added**\n* `sdk.filings.get()`:  `response.items[].marketplaceTransactionCount` **Added**\n* `sdk.products.getCategories()`: **Removed** (Breaking ⚠️)\n* `sdk.products.create()`: **Removed** (Breaking ⚠️)\n* `sdk.transactions.updateCreditNote()`: \n  *  `request.creditNoteCreate.transactionItems[].taxExemption.enum(zeroRateNotExempt)` **Added**\n* `sdk.products.get()`: **Removed** (Breaking ⚠️)\n* `sdk.products.getProductCategoriesV1ProductsCategoriesGet()`: **Added**\n"
