configVersion: 2.0.0
generation:
  sdkClassName: SDK
  maintainOpenAPIOrder: true
  usageSnippets:
    optionalPropertyRendering: withExample
    sdkInitStyle: constructor
  useClassNamesForArrayFields: true
  fixes:
    nameResolutionDec2023: true
    nameResolutionFeb2025: true
    parameterOrderingFeb2024: true
    requestResponseComponentNamesFeb2024: true
    securityFeb2025: true
    sharedErrorComponentsApr2025: true
    sharedNestedComponentsJan2026: false
    nameOverrideFeb2026: false
  auth:
    oAuth2ClientCredentialsEnabled: false
    oAuth2PasswordEnabled: false
    hoistGlobalSecurity: true
  sdkHooksConfigAccess: true
  schemas:
    allOfMergeStrategy: shallowMerge
  requestBodyFieldName: ""
  versioningStrategy: automatic
  persistentEdits: {}
  tests:
    generateTests: false
    generateNewTests: true
    skipResponseBodyAssertions: false
java:
  version: 0.15.1
  additionalDependencies: []
  additionalPlugins: []
  artifactID: kintsugi-tax-java-sdk
  asyncMode: enabled
  baseErrorName: SDKError
  clientServerStatusCodesAsErrors: true
  companyEmail: support@trykintsugi.com
  companyName: Kintsugi
  companyURL: https://trykintsugi.com
  defaultErrorName: APIException
  enableCustomCodeRegions: false
  enableFormatting: false
  enableSlf4jLogging: false
  enableStreamingUploads: false
  flattenGlobalSecurity: true
  forwardCompatibleEnumsByDefault: false
  forwardCompatibleUnionsByDefault: "false"
  generateOptionalUnionAccessors: false
  generateSpringBootStarter: true
  githubURL: https://github.com/kintsugi-tax/kintsugi-tax-java-sdk
  groupID: com.trykintsugi
  imports:
    option: openapi
    paths:
      callbacks: models/callbacks
      errors: models/errors
      operations: models/operations
      shared: models/components
      webhooks: models/webhooks
  inferUnionDiscriminators: false
  inputModelSuffix: input
  languageVersion: 11
  license:
    name: The MIT License (MIT)
    shortName: MIT
    url: https://mit-license.org/
  maxMethodParams: 4
  multipartArrayFormat: legacy
  nullFriendlyParameters: false
  operationScopedParams: true
  outputModelSuffix: output
  packageName: com.kintsugi.taxplatform
  projectName: tax-platform-sdk
  respectTitlesForPrimitiveUnionMembers: false
  templateVersion: v2
  unionStrategy: populated-fields
