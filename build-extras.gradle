// Customizations applied after Speakeasy-generated build.gradle.
// Keeps Maven Central POM metadata valid even if publishing.gradle is regenerated.

afterEvaluate {
    if (!project.ext.has('publishingConfig')) {
        return
    }

    publishing.publications.maven.pom {
        url = 'https://github.com/kintsugi-tax/kintsugi-tax-java-sdk'
        scm {
            url = 'https://github.com/kintsugi-tax/kintsugi-tax-java-sdk'
            connection = 'scm:git:git@github.com:kintsugi-tax/kintsugi-tax-java-sdk.git'
            developerConnection = 'scm:git:git@github.com:kintsugi-tax/kintsugi-tax-java-sdk.git'
        }
    }
}
